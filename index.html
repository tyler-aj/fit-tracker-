<!DOCTYPE html>
<html>
<head>
<title>Fitness Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,Helvetica,sans-serif; }
body { background:linear-gradient(135deg,#e9edf5,#dfe6f1); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.screen { display:none; }
.screen.active { display:flex; }
.container { display:flex; gap:30px; flex-wrap:wrap; justify-content:center; }
.app { width:300px; min-height:560px; background:white; border-radius:30px; box-shadow:0 20px 40px rgba(0,0,0,0.15); padding:25px; display:flex; flex-direction:column; justify-content:space-between; }
.title { font-size:26px; font-weight:bold; margin-bottom:10px; }
.subtitle { color:#777; font-size:14px; margin-bottom:25px; }
.button { background:linear-gradient(90deg,#3a7bfd,#5fa8ff); color:white; border:none; padding:14px; border-radius:12px; font-size:16px; cursor:pointer; width:100%; }
.button:hover { opacity:0.9; }
.button.secondary { background:#f5f7fb; color:#333; margin-top:10px; }
.circle { width:150px; height:150px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:auto; position:relative; }
.circle span { background:white; width:110px; height:110px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:bold; position:absolute; }
.stats { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.stat { flex:1; min-width:80px; padding:12px; border-radius:14px; background:#f5f7fb; }
.stat strong { display:block; font-size:18px; margin-top:4px; }
.form-group { margin-bottom:14px; }
.form-group label { font-size:13px; color:#555; display:block; margin-bottom:5px; }
.form-group input { width:100%; padding:10px 12px; border:1.5px solid #e0e6f0; border-radius:10px; font-size:15px; outline:none; }
.form-group input:focus { border-color:#3a7bfd; }
.toggle-group { display:flex; gap:10px; }
.toggle-btn { flex:1; padding:10px; border:1.5px solid #e0e6f0; border-radius:10px; background:white; cursor:pointer; font-size:14px; }
.toggle-btn.active { background:#3a7bfd; color:white; border-color:#3a7bfd; }
.export-box { background:#f5f7fb; border-radius:12px; padding:14px; font-size:12px; color:#444; white-space:pre-wrap; margin-top:10px; max-height:150px; overflow-y:auto; line-height:1.6; }
.nav { display:flex; gap:8px; margin-bottom:15px; }
.nav-btn { flex:1; padding:8px; border:none; border-radius:10px; cursor:pointer; font-size:12px; background:#f0f3fa; color:#555; }
.nav-btn.active { background:#3a7bfd; color:white; }
.success-msg { background:#e8f5e9; color:#2e7d32; padding:10px; border-radius:10px; font-size:13px; text-align:center; margin-top:10px; display:none; }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div class="screen active" id="welcomeScreen">
<div class="container">
<div class="app">
  <div>
    <div class="title">Welcome</div>
    <div class="subtitle">Track your fitness progress</div>
    <div style="text-align:center;margin-top:40px;">
      <img src="https://cdn-icons-png.flaticon.com/512/2936/2936886.png" width="120">
    </div>
  </div>
  <div>
    <button class="button" onclick="showScreen('checkinScreen')">Start Tracking</button>
    <button class="button secondary" onclick="showScreen('dashboardScreen')">View Dashboard</button>
  </div>
</div>
</div>
</div>

<!-- CHECK-IN SCREEN -->
<div class="screen" id="checkinScreen">
<div class="container">
<div class="app" style="min-height:auto;">
  <div>
    <div class="title">Daily Check-in</div>
    <div class="subtitle" id="checkinDate"></div>
    <div class="form-group">
      <label>👟 Steps</label>
      <input type="number" id="steps" placeholder="e.g. 8500">
    </div>
    <div class="form-group">
      <label>💧 Water (liters)</label>
      <input type="number" id="water" placeholder="e.g. 2.5" step="0.1">
    </div>
    <div class="form-group">
      <label>🥩 Protein (grams)</label>
      <input type="number" id="protein" placeholder="e.g. 120">
    </div>
    <div class="form-group">
      <label>😴 Sleep (hours)</label>
      <input type="number" id="sleep" placeholder="e.g. 7" step="0.5">
    </div>
    <div class="form-group">
      <label>💪 Workout Done?</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="workoutYes" onclick="setWorkout(true)">✅ Yes</button>
        <button class="toggle-btn" id="workoutNo" onclick="setWorkout(false)">❌ No</button>
      </div>
    </div>
    <div class="success-msg" id="successMsg">✅ Check-in saved!</div>
  </div>
  <div style="margin-top:20px;">
    <button class="button" onclick="saveCheckin()">Save Check-in</button>
    <button class="button secondary" onclick="showScreen('welcomeScreen')">← Back</button>
  </div>
</div>
</div>
</div>

<!-- DASHBOARD SCREEN -->
<div class="screen" id="dashboardScreen">
<div class="container">
<div class="app">
  <div>
    <div class="nav">
      <button class="nav-btn active" onclick="switchTab('summary',this)">Summary</button>
      <button class="nav-btn" onclick="switchTab('weekly',this)">Weekly</button>
      <button class="nav-btn" onclick="switchTab('export',this)">Export</button>
    </div>

    <!-- Summary Tab -->
    <div id="tab-summary">
      <div class="title">Dashboard</div>
      <div class="subtitle" id="dashDate"></div>
      <div class="circle" id="progressRing">
        <span id="progressPct">0%</span>
      </div>
      <div class="stats" style="margin-top:15px;">
        <div class="stat">Steps<strong id="d-steps">—</strong></div>
        <div class="stat">Water<strong id="d-water">—</strong></div>
      </div>
      <div class="stats">
        <div class="stat">Protein<strong id="d-protein">—</strong></div>
        <div class="stat">Sleep<strong id="d-sleep">—</strong></div>
      </div>
      <div class="stats">
        <div class="stat">Workout<strong id="d-workout">—</strong></div>
      </div>
    </div>

    <!-- Weekly Tab -->
    <div id="tab-weekly" style="display:none;">
      <div class="title">Weekly</div>
      <div class="subtitle">Last 7 days</div>
      <canvas id="weeklyChart" height="200"></canvas>
    </div>

    <!-- Export Tab -->
    <div id="tab-export" style="display:none;">
      <div class="title">Export</div>
      <div class="subtitle">Copy & paste to Claude or GPT</div>
      <div class="export-box" id="exportBox">No data yet. Log your first check-in!</div>
      <button class="button" style="margin-top:10px;" onclick="copyExport()">📋 Copy Summary</button>
    </div>
  </div>
  <div>
    <button class="button" onclick="showScreen('checkinScreen')">+ Log Today</button>
    <button class="button secondary" onclick="showScreen('welcomeScreen')">← Home</button>
  </div>
</div>
</div>
</div>

<script>
// GOALS
const GOALS = { steps: 10000, water: 3, protein: 150, sleep: 8 };
let workoutDone = null;
let weeklyChartInstance = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'checkinScreen') loadCheckinDefaults();
  if (id === 'dashboardScreen') loadDashboard();
}

function setWorkout(val) {
  workoutDone = val;
  document.getElementById('workoutYes').classList.toggle('active', val === true);
  document.getElementById('workoutNo').classList.toggle('active', val === false);
}

function getDateKey(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return d.toISOString().split('T')[0];
}

function loadCheckinDefaults() {
  const today = getDateKey();
  document.getElementById('checkinDate').textContent = today;
  const saved = JSON.parse(localStorage.getItem('ft-' + today) || 'null');
  if (saved) {
    document.getElementById('steps').value = saved.steps || '';
    document.getElementById('water').value = saved.water || '';
    document.getElementById('protein').value = saved.protein || '';
    document.getElementById('sleep').value = saved.sleep || '';
    setWorkout(saved.workout);
  } else {
    setWorkout(null);
  }
}

function saveCheckin() {
  const today = getDateKey();
  const data = {
    date: today,
    steps: parseFloat(document.getElementById('steps').value) || 0,
    water: parseFloat(document.getElementById('water').value) || 0,
    protein: parseFloat(document.getElementById('protein').value) || 0,
    sleep: parseFloat(document.getElementById('sleep').value) || 0,
    workout: workoutDone === true
  };
  localStorage.setItem('ft-' + today, JSON.stringify(data));
  const msg = document.getElementById('successMsg');
  msg.style.display = 'block';
  setTimeout(() => { msg.style.display = 'none'; showScreen('dashboardScreen'); }, 1200);
}

function calcProgress(data) {
  let score = 0;
  if (data.steps >= GOALS.steps) score++;
  if (data.water >= GOALS.water) score++;
  if (data.protein >= GOALS.protein) score++;
  if (data.sleep >= GOALS.sleep) score++;
  if (data.workout) score++;
  return Math.round((score / 5) * 100);
}

function loadDashboard() {
  const today = getDateKey();
  document.getElementById('dashDate').textContent = today;
  const data = JSON.parse(localStorage.getItem('ft-' + today) || 'null');
  if (data) {
    document.getElementById('d-steps').textContent = data.steps >= 1000 ? (data.steps/1000).toFixed(1)+'k' : data.steps;
    document.getElementById('d-water').textContent = data.water + 'L';
    document.getElementById('d-protein').textContent = data.protein + 'g';
    document.getElementById('d-sleep').textContent = data.sleep + 'h';
    document.getElementById('d-workout').textContent = data.workout ? '✅ Done' : '❌ Not yet';
    const pct = calcProgress(data);
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressRing').style.background =
      `conic-gradient(#4a7cff ${pct}%, #e6e6e6 0%)`;
  } else {
    document.getElementById('progressPct').textContent = '0%';
    document.getElementById('progressRing').style.background = 'conic-gradient(#4a7cff 0%, #e6e6e6 0%)';
  }
  loadExport();
}

function switchTab(tab, btn) {
  ['summary','weekly','export'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'weekly') loadWeeklyChart();
  if (tab === 'export') loadExport();
}

function loadWeeklyChart() {
  const labels = [], steps = [], water = [], protein = [], sleep = [];
  for (let i = 6; i >= 0; i--) {
    const key = getDateKey(i);
    const d = JSON.parse(localStorage.getItem('ft-' + key) || '{}');
    labels.push(key.slice(5));
    steps.push(d.steps || 0);
    water.push((d.water || 0) * 1000);
    protein.push(d.protein || 0);
    sleep.push((d.sleep || 0) * 10);
  }
  if (weeklyChartInstance) weeklyChartInstance.destroy();
  const ctx = document.getElementById('weeklyChart').getContext('2d');
  weeklyChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Steps', data: steps, backgroundColor: '#4a7cff88' },
        { label: 'Protein(g)', data: protein, backgroundColor: '#ff6b6b88' },
        { label: 'Sleep×10', data: sleep, backgroundColor: '#ffd93d88' }
      ]
    },
    options: { responsive: true, plugins: { legend: { labels: { font: { size: 10 } } } } }
  });
}

function loadExport() {
  let text = '📊 FITNESS SUMMARY — Last 7 Days\n\n';
  for (let i = 6; i >= 0; i--) {
    const key = getDateKey(i);
    const d = JSON.parse(localStorage.getItem('ft-' + key) || 'null');
    if (d) {
      text += `📅 ${d.date}\n`;
      text += `  Steps: ${d.steps} | Water: ${d.water}L | Protein: ${d.protein}g | Sleep: ${d.sleep}h | Workout: ${d.workout ? 'Yes' : 'No'}\n`;
      text += `  Progress: ${calcProgress(d)}%\n\n`;
    }
  }
  document.getElementById('exportBox').textContent = text;
}

function copyExport() {
  const text = document.getElementById('exportBox').textContent;
  navigator.clipboard.writeText(text).then(() => alert('Copied! Paste into Claude or ChatGPT.'));
}

// Init
document.getElementById('checkinDate').textContent = getDateKey();
</script>
</body>
</html>
